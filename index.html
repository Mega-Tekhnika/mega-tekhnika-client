<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEGA_TEKHNIKA | Кабінет клієнта</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="login-wrapper">

    <div class="brand">

        <div class="logo-box">
            MT
        </div>

        <div>
            <h2>MEGA_TEKHNIKA</h2>
            <span>Система перевірки замовлень</span>
        </div>

    </div>

    <div class="login-card">

        <div class="card-header">

            <h1>Перевірка замовлення</h1>

            <p>
                Введіть номер замовлення та код доступу
            </p>

        </div>

        <div class="demo-box">

            <div>
                <strong>Демо-доступ</strong><br>
                Замовлення: 9203<br>
                Код: MTK-9203
            </div>

            <div class="demo-badge">
                Демо
            </div>

        </div>

        <input
            type="text"
            id="orderNumber"
            placeholder="Номер замовлення">

        <input
            type="text"
            id="accessCode"
            placeholder="Код доступу">

        <button onclick="login()">
            Увійти
        </button>

        <div class="footer-info">

            🔒 Захищене з'єднання

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
